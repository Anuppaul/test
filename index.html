<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #eef6ff 0%, var(--bg) 55%, #e8f7f5 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border-radius: 14px;
      padding: 48px 32px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 12px;
      line-height: 1.1;
    }

    p {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      transition: transform 0.15s ease, background-color 0.15s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-secondary {
      border-color: #d1d5db;
      color: var(--text);
      background: #fff;
    }

    .btn-secondary:hover {
      background: #f3f4f6;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Build Something Great</h1>
    <p>
      A simple landing page template to help you launch quickly.
      Customize this text, add your brand, and make it yours.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="#">Get Started</a>
      <a class="btn btn-secondary" href="#">Learn More</a>
    </div>
  </main>
</body>
</html>
