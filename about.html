<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Landing Page</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #eef6ff 0%, var(--bg) 55%, #e8f7f5 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border-radius: 14px;
      padding: 48px 32px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    h1 {
      font-size: clamp(2rem, 4vw, 2.6rem);
      margin-bottom: 14px;
      line-height: 1.1;
      text-align: center;
    }

    p {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .actions {
      margin-top: 20px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>About Us</h1>
    <p>
      This is a simple About page connected to your landing page.
      You can add your company story, mission, and team information here.
    </p>
    <p>
      Everything is plain HTML and CSS, so it is easy to edit and expand.
    </p>
    <div class="actions">
      <a class="btn" href="index.html">Back to Home</a>
    </div>
  </main>
</body>
</html>
